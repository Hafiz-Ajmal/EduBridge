
services:

  app:

    #best for local dev not for production or CI
    # volumes:
    #   - .:/app

    build: .
    image: edubridge
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL}
    ports:
      - 8001:8000
    networks:
      - edubridge
    depends_on:
      postgres:
        condition: service_healthy 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]

      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
      
   


  postgres:

    image: postgres:15.18-alpine3.24
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: edubridge
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    volumes: 
      - postgres-data:/var/lib/postgresql/data

    networks:
      - edubridge
    restart: unless-stopped

networks:
  edubridge:
volumes:
  postgres-data:
    
    
  

 
    




